<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>2026 FIFA World Cup Tactical Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#B22234;--navy:#3C3B6E;--gold:#f0c040;--accent:#4fc3f7;--muted:#99aabb;--border:rgba(255,255,255,0.1);--bg:#0e0e1c}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Barlow Condensed',sans-serif}
.app{display:flex;flex-direction:column;height:100%}

/* HEADER */
.hdr{background:linear-gradient(90deg,var(--navy),#1a1a3e);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--red);flex-shrink:0;gap:8px;flex-wrap:wrap}
.hdr-l{display:flex;align-items:center;gap:8px}
.htitle{font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.htitle em{color:var(--red);font-style:normal}
.team-selector{display:flex;align-items:center;gap:6px}
.team-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:5px;border:1.5px solid var(--border);background:rgba(255,255,255,.06);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;color:#fff;transition:.12s;min-width:140px}
.team-btn:hover{border-color:var(--accent);background:rgba(79,195,247,.08)}
.team-btn .flag-em{font-size:18px;line-height:1}
.team-btn .tname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.team-btn .tcolor{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.vs-badge{font-size:12px;font-weight:900;color:var(--muted);letter-spacing:1px}
.hdr-r{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.xbtn{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:none;background:var(--red);color:#fff;cursor:pointer;white-space:nowrap}
.xbtn:hover{background:#c0392b}
.clr-btn{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
.clr-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.save-btn{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:none;background:#1e6830;color:#fff;cursor:pointer;white-space:nowrap;transition:.12s}
.save-btn:hover{background:#27ae60}
.load-btn{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1px solid rgba(79,195,247,.4);background:rgba(79,195,247,.1);color:var(--accent);cursor:pointer;white-space:nowrap;transition:.12s}
.load-btn:hover{background:rgba(79,195,247,.2);border-color:var(--accent)}
.rate-btn{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1.5px solid rgba(240,192,64,.4);background:transparent;color:var(--gold);cursor:pointer;white-space:nowrap;transition:.12s}
.rate-btn:hover{background:rgba(240,192,64,.12);border-color:var(--gold)}
.rate-btn.active{background:rgba(240,192,64,.2);border-color:var(--gold);color:#fff}
/* SAVE MODAL */
.smo{position:fixed;z-index:999;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center}
.smo-box{background:#12121e;border:1.5px solid var(--accent);border-radius:12px;width:480px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.smo-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.smo-title{font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.smo-body{overflow-y:auto;padding:12px}
.save-name-row{display:flex;gap:8px;margin-bottom:14px}
.save-name-input{flex:1;padding:8px 12px;background:rgba(255,255,255,.07);border:1.5px solid var(--border);border-radius:6px;color:#fff;font-size:13px;font-weight:700;font-family:inherit;outline:none}
.save-name-input:focus{border-color:var(--accent)}
.save-now-btn{padding:8px 16px;border-radius:6px;border:none;background:#27ae60;color:#fff;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;font-family:inherit}
.save-now-btn:hover{background:#2ecc71}
.saves-list{display:flex;flex-direction:column;gap:6px}
.save-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04)}
.save-item:hover{background:rgba(255,255,255,.07)}
.save-item-info{flex:1;min-width:0}
.save-item-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.save-item-meta{font-size:10px;color:var(--muted);margin-top:2px}
.save-item-btns{display:flex;gap:5px;flex-shrink:0}
.si-load{padding:5px 10px;border-radius:5px;border:none;background:rgba(79,195,247,.2);color:var(--accent);font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.5px}
.si-load:hover{background:rgba(79,195,247,.35)}
.si-del{padding:5px 8px;border-radius:5px;border:1px solid rgba(178,34,52,.4);background:transparent;color:rgba(178,34,52,.7);font-size:11px;font-weight:800;cursor:pointer;font-family:inherit}
.si-del:hover{background:rgba(178,34,52,.2);color:var(--red);border-color:var(--red)}
.no-saves{text-align:center;color:var(--muted);font-size:12px;padding:24px 0;line-height:1.6}

/* BODY */
.body{display:flex;flex:1;overflow:hidden}

/* PANELS */
.panel{width:145px;flex-shrink:0;overflow-y:auto;padding:4px;display:flex;flex-direction:column;gap:1px}
.panel-home{background:#0a0d14;border-right:1px solid var(--border)}
.panel-away{background:#100a14;border-left:1px solid var(--border)}
.psec{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:5px 4px 2px;border-bottom:1px solid var(--border);margin-bottom:1px}
.prow{display:flex;align-items:center;gap:5px;padding:5px 5px;border-radius:4px;cursor:pointer;transition:.1s;position:relative;user-select:none}
.prow:hover{background:rgba(255,255,255,.07)}
.prow.on{opacity:.3;pointer-events:none}
.prow.on::after{content:'✓';position:absolute;right:4px;font-size:10px;font-weight:900;color:var(--gold)}
.prow-no{font-size:14px;font-weight:900;min-width:20px;text-align:center}
.prow-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.prow-pos{display:inline-block;font-size:8px;font-weight:800;padding:1px 3px;border-radius:2px;margin-top:1px}
.prow-pos.GK{background:#e67e22;color:#fff}
.prow-pos.DEF{background:#2471a3;color:#fff}
.prow-pos.MID{background:#1e8449;color:#fff}
.prow-pos.FWD{background:#c0392b;color:#fff}

/* PITCH */
.pitch-wrap{flex:1;position:relative;overflow:hidden}
#cv{display:block;width:100%;height:100%}

/* TOOLBAR */
.toolbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:3px;background:rgba(8,8,22,.92);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:5px 7px;z-index:50;user-select:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.tb-sep{width:1px;height:26px;background:rgba(255,255,255,.12);margin:0 3px}
.tb-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:36px;height:36px;border-radius:6px;border:none;background:transparent;color:#ccd;cursor:pointer;transition:.12s;font-family:inherit}
.tb-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.tb-btn.active{background:rgba(79,195,247,.18);color:var(--accent);border:1px solid rgba(79,195,247,.4)}
.tb-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tb-lbl{font-size:7px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;opacity:.7;line-height:1}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:.12s}
.swatch.active{border-color:#fff;transform:scale(1.15)}
.tb-sm{font-size:9px;font-weight:800;padding:4px 7px;border-radius:4px;border:1px solid rgba(255,255,255,.15);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.tb-sm:hover{background:rgba(255,255,255,.08);color:#fff}
.tb-sm.danger:hover{background:rgba(178,34,52,.3);border-color:var(--red);color:var(--red)}

/* TEAM PICKER MODAL */
.tpicker{position:fixed;z-index:999;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center}
.tpicker-box{background:#12121e;border:1.5px solid var(--accent);border-radius:12px;width:680px;max-width:96vw;max-height:82vh;display:flex;flex-direction:column;overflow:hidden}
.tpicker-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tpicker-title{font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.tpicker-srch{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.tpicker-srch input{width:100%;padding:6px 10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:5px;color:#fff;font-size:12px;outline:none;font-family:inherit}
.tpicker-srch input:focus{border-color:var(--accent)}
.tpicker-body{overflow-y:auto;padding:10px 12px}
.conf-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:6px}
.conf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;margin-bottom:10px}
.team-card{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.03);cursor:pointer;transition:.12s}
.team-card:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25)}
.tc-flag{font-size:20px;line-height:1;flex-shrink:0}
.tc-name{font-size:11px;font-weight:700;line-height:1.2}
.tc-grp{font-size:9px;color:var(--muted);font-weight:600}

/* ROLE MODAL */
.mo{position:fixed;z-index:999;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

/* LANDSCAPE LOCK */
#rotate-overlay{display:none;position:fixed;inset:0;z-index:9999;background:#0e0e1c;flex-direction:column;align-items:center;justify-content:center;gap:18px}
@media (orientation:portrait){#rotate-overlay{display:flex}}
.rotate-icon{font-size:72px;animation:spin 2s ease-in-out infinite}
@keyframes spin{0%,100%{transform:rotate(0deg)}40%{transform:rotate(90deg)}60%{transform:rotate(90deg)}}
.rotate-msg{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#fff;text-align:center}
.rotate-sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#99aabb;letter-spacing:.5px;text-align:center}

/* PLAY BUILDER */
.play-bar{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  display:none;align-items:center;gap:5px;
  background:rgba(8,8,22,.95);border:1.5px solid var(--gold);
  border-radius:10px;padding:5px 8px;z-index:60;
  box-shadow:0 4px 24px rgba(0,0,0,.6);white-space:nowrap;
}
.play-bar.visible{display:flex}
.play-sep{width:1px;height:24px;background:rgba(255,255,255,.15);margin:0 2px}
.play-step-btn{
  display:flex;align-items:center;gap:3px;padding:5px 10px;
  border-radius:6px;border:none;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;transition:.12s;
}
.pbtn-record{background:rgba(239,68,68,.25);color:#ef4444;border:1.5px solid rgba(239,68,68,.5)}
.pbtn-record:hover{background:rgba(239,68,68,.4)}
.pbtn-record.recording{background:#ef4444;color:#fff;animation:rec-pulse 1s infinite}
@keyframes rec-pulse{0%,100%{opacity:1}50%{opacity:.6}}
.pbtn-play{background:rgba(39,174,96,.25);color:#27ae60;border:1.5px solid rgba(39,174,96,.5)}
.pbtn-play:hover{background:rgba(39,174,96,.4)}
.pbtn-play.playing{background:#27ae60;color:#fff}
.pbtn-nav{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.12s}
.pbtn-nav:hover{background:rgba(255,255,255,.1);color:#fff}
.pbtn-nav:disabled{opacity:.25;pointer-events:none}
.step-counter{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.5px;min-width:50px;text-align:center}
.speed-sel{background:rgba(255,255,255,.08);border:1px solid var(--border);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;border-radius:4px;padding:3px 5px;outline:none;cursor:pointer}
.pbtn-gif{background:rgba(168,85,247,.25);color:#a855f7;border:1.5px solid rgba(168,85,247,.5);padding:5px 10px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:.12s}
.pbtn-gif:hover{background:rgba(168,85,247,.4)}
.pbtn-del{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);padding:4px 8px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
.pbtn-del:hover{background:rgba(239,68,68,.3)}
/* Step dots */
.step-dots{display:flex;align-items:center;gap:3px}
.step-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);cursor:pointer;transition:.12s;background:transparent}
.step-dot.filled{background:var(--gold);border-color:var(--gold)}
.step-dot.active{background:#fff;border-color:#fff;transform:scale(1.3)}
/* Play mode button in header */
.play-mode-btn{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1.5px solid rgba(240,192,64,.4);background:transparent;color:var(--gold);cursor:pointer;white-space:nowrap;transition:.12s}
.play-mode-btn:hover{background:rgba(240,192,64,.12)}
.play-mode-btn.active{background:rgba(240,192,64,.2);border-color:var(--gold);color:#fff}
/* Ball */
.ball-token{cursor:grab}
</style>
</head>
<body>

<div id="rotate-overlay">
  <div class="rotate-icon">📱</div>
  <div class="rotate-msg">Rotate Your Device</div>
  <div class="rotate-sub">This app works best in landscape mode</div>
</div>

<div class="app">
<div class="hdr">
  <div class="hdr-l">
    <div style="width:28px;height:19px;position:relative;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.3);flex-shrink:0">
      <div style="height:6.3px;width:100%;background:#B22234"></div><div style="height:6.3px;width:100%;background:#fff"></div><div style="height:6.3px;width:100%;background:#B22234"></div>
      <div style="position:absolute;top:0;left:0;width:38%;height:66%;background:#3C3B6E"></div>
    </div>
    <div class="htitle"><em>2026</em> FIFA World Cup Tactical Board</div>
  </div>
  <div class="team-selector">
    <button class="team-btn" id="btn-home">
      <span class="flag-em" id="home-flag">🇺🇸</span>
      <span class="tname" id="home-name">USA</span>
    </button>
    <span class="vs-badge">VS</span>
    <button class="team-btn" id="btn-away">
      <span class="flag-em" id="away-flag">🌍</span>
      <span class="tname" id="away-name">Select Team</span>
    </button>
  </div>
  <div class="hdr-r">
    <button class="play-mode-btn" id="btn-play-mode">🎬 Play Builder</button>
    <button class="rate-btn" id="btn-rate">⭐ Rate Players</button>
    <button class="clr-btn" id="btn-export-ratings" style="border-color:rgba(79,195,247,.4);color:var(--accent)">📋 Export Ratings</button>
    <button class="clr-btn" id="btn-clear-ratings">✕ Clear Ratings</button>
    <button class="clr-btn" id="btn-clear-all">Clear All</button>
    <button class="save-btn" id="btn-save">💾 Save</button>
    <button class="load-btn" id="btn-load">📂 Saves</button>
    <button class="xbtn" id="xbtn">⬇ Export PNG</button>
  </div>
</div>

<div class="body">
  <div class="panel panel-home" id="pl"></div>
  <div class="pitch-wrap"><canvas id="cv"></canvas>
    <div class="toolbar" id="toolbar">
      <div style="display:flex;gap:2px">
        <button class="tb-btn" id="tool-ball" title="Place/move the ball"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 3 C10 7 8 9 3 9"/><path d="M12 3 C14 7 16 9 21 9"/><path d="M3 9 C5 14 9 17 12 21"/><path d="M21 9 C19 14 15 17 12 21"/><path d="M12 21 C11 17 9 14 8 12 S9 8 12 3"/></svg><span class="tb-lbl">Ball</span></button>
      <div class="tb-sep"></div>
      <button class="tb-btn active" id="tool-select"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 2-3 7z"/></svg><span class="tb-lbl">Move</span></button>
      </div>
      <div class="tb-sep"></div>
      <div style="display:flex;gap:2px">
        <button class="tb-btn" id="tool-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="10,5 19,5 19,14"/></svg><span class="tb-lbl">Arrow</span></button>
        <button class="tb-btn" id="tool-darrow"><svg viewBox="0 0 24 24" stroke-dasharray="4 2.5"><line x1="5" y1="19" x2="18" y2="6"/><polyline points="10,6 18,6 18,14" stroke-dasharray="0"/></svg><span class="tb-lbl">Dash</span></button>
        <button class="tb-btn" id="tool-curve"><svg viewBox="0 0 24 24"><path d="M4 20 Q12 4 20 12"/><polyline points="15,8 20,12 16,17"/></svg><span class="tb-lbl">Curve</span></button>
        <button class="tb-btn" id="tool-line"><svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg><span class="tb-lbl">Line</span></button>
        <button class="tb-btn" id="tool-circle"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg><span class="tb-lbl">Zone</span></button>
        <button class="tb-btn" id="tool-freehand"><svg viewBox="0 0 24 24"><path d="M4 20 Q6 14 10 13 Q14 12 16 8 Q18 4 20 4"/></svg><span class="tb-lbl">Pen</span></button>
      </div>
      <div class="tb-sep"></div>
      <div style="display:flex;gap:5px;align-items:center" id="color-group">
        <div class="swatch active" data-color="#ffffff" style="background:#fff"></div>
        <div class="swatch" data-color="#f0c040" style="background:#f0c040"></div>
        <div class="swatch" data-color="#4fc3f7" style="background:#4fc3f7"></div>
        <div class="swatch" data-color="#ef5350" style="background:#ef5350"></div>
        <div class="swatch" data-color="#66bb6a" style="background:#66bb6a"></div>
        <div class="swatch" data-color="#ff9800" style="background:#ff9800"></div>
      </div>
      <div class="tb-sep"></div>
      <div style="display:flex;gap:3px;align-items:center">
        <button class="tb-btn active" data-w="2" style="width:28px;height:28px"><svg viewBox="0 0 18 18"><line x1="2" y1="9" x2="16" y2="9" stroke-width="1.5"/></svg></button>
        <button class="tb-btn" data-w="4" style="width:28px;height:28px"><svg viewBox="0 0 18 18"><line x1="2" y1="9" x2="16" y2="9" stroke-width="3"/></svg></button>
        <button class="tb-btn" data-w="7" style="width:28px;height:28px"><svg viewBox="0 0 18 18"><line x1="2" y1="9" x2="16" y2="9" stroke-width="5.5"/></svg></button>
      </div>
      <div class="tb-sep"></div>
      <div style="display:flex;gap:3px">
        <button class="tb-sm" id="btn-undo">↩ Undo</button>
        <button class="tb-sm danger" id="btn-clear-draw">Clear Art</button>
      </div>
    </div>

    <!-- PLAY BUILDER BAR -->
    <div class="play-bar" id="play-bar">
      <button class="play-step-btn pbtn-record" id="pbtn-record">⏺ Record Step</button>
      <div class="play-sep"></div>
      <div class="step-dots" id="step-dots"></div>
      <div class="step-counter" id="step-counter">0 steps</div>
      <div class="play-sep"></div>
      <button class="pbtn-nav" id="pbtn-prev">◀</button>
      <button class="play-step-btn pbtn-play" id="pbtn-play">▶ Play</button>

  c.beginPath();c.arc(fx+fw*0.115,fy+fh/2,fh*0.16,-Math.PI*0.38,Math.PI*0.38);c.stroke();
  c.strokeRect(fx+fw-paW,fy+(fh-paH)/2,paW,paH);c.strokeRect(fx+fw-s6W,fy+(fh-s6H)/2,s6W,s6H);
  c.beginPath();c.arc(fx+fw*0.885,fy+fh/2,3,0,Math.PI*2);c.fillStyle='rgba(255,255,255,.55)';c.fill();
  c.beginPath();c.arc(fx+fw*0.885,fy+fh/2,fh*0.16,Math.PI*0.62,Math.PI*1.38);c.stroke();
  [[fx,fy,0,Math.PI/2],[fx+fw,fy,Math.PI/2,Math.PI],[fx+fw,fy+fh,Math.PI,1.5*Math.PI],[fx,fy+fh,1.5*Math.PI,2*Math.PI]].forEach(([cx2,cy2,a1,a2])=>{c.beginPath();c.arc(cx2,cy2,fh*0.04,a1,a2);c.stroke();});
  c.fillStyle='rgba(255,255,255,.4)';const gH=fh*0.2,gD=W*0.018;
  c.fillRect(fx-gD,fy+(fh-gH)/2,gD,gH);c.fillRect(fx+fw,fy+(fh-gH)/2,gD,gH);
}

function renderShape(c,s){
  c.save();c.strokeStyle=s.color;c.fillStyle=s.color;c.lineWidth=s.w;c.lineCap='round';c.lineJoin='round';
  if(s.type==='arrow'||s.type==='darrow'){
    if(s.type==='darrow')c.setLineDash([10,6]);
    c.beginPath();c.moveTo(s.x1,s.y1);c.lineTo(s.x2,s.y2);c.stroke();c.setLineDash([]);
    drawArrowHead(c,s.x1,s.y1,s.x2,s.y2,s.w);
  } else if(s.type==='curve'){
    const cx2=s.cx,cy2=s.cy;
    c.beginPath();c.moveTo(s.x1,s.y1);c.quadraticCurveTo(cx2,cy2,s.x2,s.y2);c.stroke();
    const tx=s.x2-cx2,ty=s.y2-cy2;drawArrowHead(c,s.x2-tx*0.01,s.y2-ty*0.01,s.x2,s.y2,s.w);
  } else if(s.type==='line'){
    c.beginPath();c.moveTo(s.x1,s.y1);c.lineTo(s.x2,s.y2);c.stroke();
  } else if(s.type==='circle'){
    const rx=Math.abs(s.x2-s.x1)/2,ry=Math.abs(s.y2-s.y1)/2,cx2=(s.x1+s.x2)/2,cy2=(s.y1+s.y2)/2;
    c.beginPath();c.ellipse(cx2,cy2,Math.max(rx,4),Math.max(ry,4),0,0,Math.PI*2);
    c.globalAlpha=0.18;c.fill();c.globalAlpha=1;c.stroke();
  } else if(s.type==='freehand'&&s.pts&&s.pts.length>1){
    c.beginPath();c.moveTo(s.pts[0].x,s.pts[0].y);
    for(let i=1;i<s.pts.length;i++){const mx=(s.pts[i-1].x+s.pts[i].x)/2,my=(s.pts[i-1].y+s.pts[i].y)/2;c.quadraticCurveTo(s.pts[i-1].x,s.pts[i-1].y,mx,my);}
    c.lineTo(s.pts[s.pts.length-1].x,s.pts[s.pts.length-1].y);c.stroke();
  }
  c.restore();
}
function drawArrowHead(c,x1,y1,x2,y2,w){
  const angle=Math.atan2(y2-y1,x2-x1),len=Math.max(10,w*4),sp=0.45;
  c.save();c.fillStyle=c.strokeStyle;
  c.beginPath();c.moveTo(x2,y2);c.lineTo(x2-len*Math.cos(angle-sp),y2-len*Math.sin(angle-sp));c.lineTo(x2-len*Math.cos(angle+sp),y2-len*Math.sin(angle+sp));c.closePath();c.fill();c.restore();
}

function ratingColor(r){
  if(r===null||r===undefined)return null;
  if(r>=9)return'#a855f7';   // purple — outstanding
  if(r>=7.5)return'#22c55e'; // green — good
  if(r>=6)return'#f0c040';   // gold — decent
  if(r>=5)return'#fb923c';   // orange — poor
  return'#ef4444';            // red — awful
}

function drawRatingBadge(c,rating,cx2,byStart){
  if(rating===null||rating===undefined)return;
  const col=ratingColor(rating);
  const bw=Math.max(36,Math.round(byStart*0)); // unused, kept for compat
  // Fixed sizes — large and readable
  const BW=42, BH=20;
  const bx=cx2;
  const by=byStart;
  const label=rating%1===0?rating+'.0':String(rating);
  c.save();
  c.shadowColor='rgba(0,0,0,.7)';c.shadowBlur=5;
  c.fillStyle=col;
  c.beginPath();c.roundRect(bx-BW/2,by,BW,BH,4);c.fill();
  c.shadowBlur=0;
  c.fillStyle='#000';c.font=`900 ${Math.round(BH*0.78)}px 'Barlow Condensed',Arial`;
  c.textAlign='center';c.textBaseline='middle';
  c.fillText(label,bx,by+BH/2);
  c.restore();
}

function teamColor(side){
  if(side==='home'&&homeTeam&&TEAMS[homeTeam])return TEAMS[homeTeam].color;
  if(side==='away'&&awayTeam&&TEAMS[awayTeam])return TEAMS[awayTeam].color;
  return '#888';
}

function drawStarterToken(c,p,cx2,cy2,dragging,side){
  const r=R(),col=teamColor(side);
  c.save();c.shadowColor='rgba(0,0,0,.55)';c.shadowBlur=dragging?18:9;
  c.beginPath();c.arc(cx2,cy2,r,0,Math.PI*2);c.fillStyle='#fff';c.fill();c.restore();
  c.beginPath();c.arc(cx2,cy2,r,0,Math.PI*2);c.fillStyle='#fff';c.fill();
  c.strokeStyle=dragging?'#f0c040':col;c.lineWidth=dragging?3.5:3;c.stroke();
  // Colored fill tint
  c.beginPath();c.arc(cx2,cy2,r,0,Math.PI*2);c.fillStyle=col+'22';c.fill();
  c.fillStyle='#111';c.font=`900 ${Math.round(r*1.2)}px 'Barlow Condensed',Arial`;
  c.textAlign='center';c.textBaseline='middle';c.fillText(p.no,cx2,cy2);
  const ns=Math.max(11,Math.round(r*0.72));
  c.font=`800 ${ns}px 'Barlow Condensed',Arial`;const tw=c.measureText(p.s).width;
  c.fillStyle='rgba(0,0,0,.75)';c.beginPath();c.roundRect(cx2-tw/2-6,cy2+r+2,tw+12,ns+6,3);c.fill();
  c.fillStyle='#fff';c.textAlign='center';c.textBaseline='top';c.fillText(p.s,cx2,cy2+r+5);
  // Rating badge — positioned below the name pill
  const rating=p.rating;
  if(rating!==null&&rating!==undefined){
    const namePillBottom = cy2+r+2 + (ns+6) + 3; // circle bottom + pill height + gap
    drawRatingBadge(c,rating,cx2,namePillBottom);
  }
  // Rating mode highlight ring
  if(ratingMode){
    c.beginPath();c.arc(cx2,cy2,r+4,0,Math.PI*2);
    c.strokeStyle='rgba(240,192,64,0.5)';c.lineWidth=1.5;c.setLineDash([3,3]);c.stroke();c.setLineDash([]);
  }
}
function drawSubToken(c,p,cx2,cy2,dragging,side){
  const ns=Math.max(11,Math.round(Math.min(W,H)*0.022*1.05));
  c.save();
  c.globalAlpha=dragging?1.0:0.75;
  c.font=`italic 700 ${ns}px 'Barlow Condensed',Arial`;
  c.shadowColor='rgba(0,0,0,.8)';c.shadowBlur=4;
  c.fillStyle=dragging?'#f0c040':'#fff';
  c.textAlign='center';c.textBaseline='middle';
  c.fillText(p.s,cx2,cy2);
  c.restore();
  // Rating badge: sits directly below the name text
  if(p.rating!==null&&p.rating!==undefined){
    // Badge sits below the italic name text
    const subPillBottom = cy2 + ns*0.6 + 3;
    drawRatingBadge(c,p.rating,cx2,subPillBottom);
  }
}

// ── CANVAS EVENTS ──
function ptXY(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function buildPreview(x,y){
  if(!drawStart)return null;
  const s={color:drawColor,w:strokeW};
  if(tool==='arrow')return{...s,type:'arrow',x1:drawStart.x,y1:drawStart.y,x2:x,y2:y};
  if(tool==='darrow')return{...s,type:'darrow',x1:drawStart.x,y1:drawStart.y,x2:x,y2:y};
  if(tool==='line')return{...s,type:'line',x1:drawStart.x,y1:drawStart.y,x2:x,y2:y};
  if(tool==='circle')return{...s,type:'circle',x1:drawStart.x,y1:drawStart.y,x2:x,y2:y};
  if(tool==='curve'){const cx2=(drawStart.x+x)/2-(y-drawStart.y)*0.4,cy2=(drawStart.y+y)/2+(x-drawStart.x)*0.4;return{...s,type:'curve',x1:drawStart.x,y1:drawStart.y,cx:cx2,cy:cy2,x2:x,y2:y};}
  return null;
}

cv.addEventListener('mousedown',e=>{
  const{x,y}=ptXY(e);
  if(tool==='select'){
    // Rating mode: click opens rating popup, no drag
    if(ratingMode){
      for(let i=tokens.length-1;i>=0;i--){if(dist(x,y,tx(tokens[i]),ty(tokens[i]))<hitR(tokens[i])+6){openRatingPopup(i,x,y);return;}}
      return;
    }
    for(let i=tokens.length-1;i>=0;i--){if(dist(x,y,tx(tokens[i]),ty(tokens[i]))<hitR(tokens[i])){dragIdx=i;dox=x-tx(tokens[i]);doy=y-ty(tokens[i]);cv.style.cursor='grabbing';return;}}return;}
  if(tool==='freehand'){isDrawing=true;freehandPts=[{x,y}];return;}
  isDrawing=true;drawStart={x,y};
});
cv.addEventListener('mousemove',e=>{
  const{x,y}=ptXY(e);
  if(tool==='select'){
    if(dragIdx!==null){tokens[dragIdx].fx=Math.max(R()/W,Math.min(1-R()/W,(x-dox)/W));tokens[dragIdx].fy=Math.max(R()/H,Math.min(1-R()/H,(y-doy)/H));draw();}
    else cv.style.cursor=ratingMode?(tokens.some(t=>dist(x,y,tx(t),ty(t))<hitR(t))?'pointer':'default'):tokens.some(t=>dist(x,y,tx(t),ty(t))<hitR(t))?'grab':'default';
    return;
  }
  cv.style.cursor='crosshair';if(!isDrawing)return;
  if(tool==='freehand'){freehandPts.push({x,y});draw({type:'freehand',color:drawColor,w:strokeW,pts:[...freehandPts]});return;}
  draw(buildPreview(x,y));
});
cv.addEventListener('mouseup',e=>{
  const{x,y}=ptXY(e);
  if(tool==='select'){
    if(dragIdx!==null){dragIdx=null;cv.style.cursor='default';draw();}
    return;
  }
  if(!isDrawing)return;isDrawing=false;
  if(tool==='freehand'){if(freehandPts.length>2)drawings.push({type:'freehand',color:drawColor,w:strokeW,pts:[...freehandPts]});freehandPts=[];draw();return;}
  const shape=buildPreview(x,y);if(shape&&dist(drawStart.x,drawStart.y,x,y)>6)drawings.push(shape);drawStart=null;draw();
});
cv.addEventListener('mouseleave',()=>{
  if(dragIdx!==null){dragIdx=null;draw();}
  if(isDrawing&&tool==='freehand'&&freehandPts.length>2){drawings.push({type:'freehand',color:drawColor,w:strokeW,pts:[...freehandPts]});freehandPts=[];isDrawing=false;draw();}
});
cv.addEventListener('contextmenu',e=>{
  e.preventDefault();if(tool!=='select'){if(drawings.length){drawings.pop();draw();}return;}
  const{x,y}=ptXY(e);for(let i=tokens.length-1;i>=0;i--){if(dist(x,y,tx(tokens[i]),ty(tokens[i]))<hitR(tokens[i])){tokens.splice(i,1);draw();renderPanels();return;}}
  if(drawings.length){drawings.pop();draw();}
});
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],{x,y}=ptXY({clientX:t.clientX,clientY:t.clientY});
  if(tool==='select'){
    if(ratingMode){for(let i=tokens.length-1;i>=0;i--){if(dist(x,y,tx(tokens[i]),ty(tokens[i]))<hitR(tokens[i])+10){openRatingPopup(i,x,y);return;}}return;}
    for(let i=tokens.length-1;i>=0;i--){if(dist(x,y,tx(tokens[i]),ty(tokens[i]))<hitR(tokens[i])+8){dragIdx=i;dox=x-tx(tokens[i]);doy=y-ty(tokens[i]);return;}}}
  else{isDrawing=true;if(tool==='freehand')freehandPts=[{x,y}];else drawStart={x,y};}
},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],{x,y}=ptXY({clientX:t.clientX,clientY:t.clientY});
  if(tool==='select'){if(dragIdx===null)return;tokens[dragIdx].fx=Math.max(R()/W,Math.min(1-R()/W,(x-dox)/W));tokens[dragIdx].fy=Math.max(R()/H,Math.min(1-R()/H,(y-doy)/H));draw();}
  else if(isDrawing){if(tool==='freehand'){freehandPts.push({x,y});draw({type:'freehand',color:drawColor,w:strokeW,pts:[...freehandPts]});}else draw(buildPreview(x,y));}
},{passive:false});
cv.addEventListener('touchend',e=>{
  const last=e.changedTouches[0],{x,y}=ptXY({clientX:last.clientX,clientY:last.clientY});
  if(tool==='select'){if(dragIdx!==null){dragIdx=null;draw();}return;}
  if(!isDrawing)return;isDrawing=false;
  if(tool==='freehand'){if(freehandPts.length>2)drawings.push({type:'freehand',color:drawColor,w:strokeW,pts:[...freehandPts]});freehandPts=[];}
  else{const s=buildPreview(x,y);if(s&&dist(drawStart.x,drawStart.y,x,y)>6)drawings.push(s);drawStart=null;}
  draw();
});

// ── TOOLBAR ──
function setTool(id){
  tool=id;
  document.querySelectorAll('.tb-btn[id^="tool-"]').forEach(x=>x.classList.remove('active'));
  const b=document.getElementById('tool-'+id);if(b)b.classList.add('active');
  cv.style.cursor=id==='select'?'default':'crosshair';
  isDrawing=false;drawStart=null;freehandPts=[];
}
['select','arrow','darrow','curve','line','circle','freehand'].forEach(id=>{
  const b=document.getElementById('tool-'+id);if(!b)return;
  b.onclick=()=>{
    // Clicking the already-active drawing tool toggles back to select
    if(tool===id && id!=='select'){
      setTool('select');
    } else {
      setTool(id);
    }
  };
});
document.querySelectorAll('.swatch').forEach(el=>{
  el.onclick=()=>{document.querySelectorAll('.swatch').forEach(c=>c.classList.remove('active'));el.classList.add('active');drawColor=el.dataset.color;};
});
document.querySelectorAll('[data-w]').forEach(el=>{
  el.onclick=()=>{document.querySelectorAll('[data-w]').forEach(b=>b.classList.remove('active'));el.classList.add('active');strokeW=parseInt(el.dataset.w);};
});
document.getElementById('btn-undo').onclick=()=>{drawings.pop();draw();};
document.getElementById('btn-clear-draw').onclick=()=>{if(confirm('Clear all drawings?')){drawings=[];draw();}};
document.getElementById('btn-clear-ratings').onclick=()=>{
  if(tokens.every(t=>t.player.rating==null)){return;}
  if(confirm('Clear all player ratings?')){
    tokens.forEach(t=>{ delete t.player.rating; delete t.player.comment; });
    draw();
  }
};
document.getElementById('btn-clear-all').onclick=()=>{if(confirm('Clear everything?')){tokens=[];drawings=[];draw();renderPanels();}};

// ── RATING MODE ──
document.getElementById('btn-rate').onclick=function(){
  ratingMode=!ratingMode;
  dragIdx=null; // cancel any in-progress drag
  this.classList.toggle('active',ratingMode);
  this.textContent=ratingMode?'✓ Rating Mode':'⭐ Rate Players';
  cv.style.cursor=ratingMode?'pointer':'default';
  if(ratingMode)setTool('select');
  draw();
};

function openRatingPopup(tokenIdx,canvasX,canvasY){
  const token=tokens[tokenIdx];

  const ov=document.getElementById('mo');ov.innerHTML='';ov.style.display='flex';

  box.style.cssText='background:#1a1a2e;border:1.5px solid var(--gold);border-radius:10px;width:280px;overflow:hidden;font-family:Barlow Condensed,sans-serif';

  // Header

  const playerInfo=document.createElement('div');
  playerInfo.innerHTML=`<div style="font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff">Rate Player</div><div style="font-size:12px;color:var(--gold);font-weight:700;margin-top:1px">#${p.no} ${p.name}</div>`;
  const cls=document.createElement('button');cls.textContent='×';cls.style.cssText='background:transparent;border:none;color:#8899aa;font-size:18px;cursor:pointer;line-height:1;padding:0';cls.onclick=()=>ov.style.display='none';

  });

  // Manual number input alongside slider
  const numInp=document.createElement('input');numInp.type='number';numInp.min=1;numInp.max=10;numInp.step=0.5;

  numInp.onfocus=()=>numInp.style.borderColor='var(--gold)';

  };

  numInp.oninput=()=>{

  body.appendChild(clrBtn);

  box.appendChild(body);ov.appendChild(box);
  ov.onclick=e=>{if(e.target===ov)ov.style.display='none';};
  setTimeout(()=>manInp.focus(),100);
}

// ── PANELS ──
function onField(no,side){return tokens.some(t=>t.player.no===no&&t.side===side);}
function renderPanels(){
  buildPanel('pl','home');
  buildPanel('pr','away');
}
function buildPanel(id,side){
  const el=document.getElementById(id);el.innerHTML='';
  const key=side==='home'?homeTeam:awayTeam;
  if(!key||!TEAMS[key]){
    el.innerHTML=`<div style="padding:12px 6px;text-align:center;color:var(--muted);font-size:11px;line-height:1.5">${side==='home'?'Home':'Away'} team<br>not selected</div>`;return;
  }
  const team=TEAMS[key];
  const col=team.color;
  const header=document.createElement('div');
  header.style.cssText=`padding:7px 5px 4px;text-align:center;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid ${col};margin-bottom:2px;color:#fff`;
  header.innerHTML=`${team.flag} ${key}`;
  el.appendChild(header);
  ['GK','DEF','MID','FWD'].forEach(pos=>{
    const players=team.players.filter(p=>p.pos===pos);if(!players.length)return;
    const sec=document.createElement('div');sec.className='psec';sec.textContent=pos==='GK'?'GKs':pos==='DEF'?'DEF':pos==='MID'?'MID':'FWD';el.appendChild(sec);
    players.forEach(p=>{
      const row=document.createElement('div');row.className='prow'+(onField(p.no,side)?' on':'');
      row.innerHTML=`<span class="prow-no" style="color:${col}">${p.no}</span><div><div class="prow-name">${p.s}</div><span class="prow-pos ${p.pos}">${p.pos}</span></div>`;
      if(!onField(p.no,side))row.onclick=()=>showRolePrompt(p,side);
      el.appendChild(row);
    });
  });
}

function showRolePrompt(p,side){
  const ov=document.getElementById('mo');ov.innerHTML='';ov.style.display='flex';
  const box=document.createElement('div');
  box.style.cssText='background:#1a1a2e;border:1.5px solid var(--accent);border-radius:10px;width:280px;overflow:hidden;font-family:Barlow Condensed,sans-serif';
  const hdr=document.createElement('div');hdr.style.cssText='padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between';
  hdr.innerHTML=`<div><div style="font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#fff">Add Player</div><div style="font-size:11px;color:var(--gold);font-weight:700;margin-top:1px">#${p.no} ${p.s}</div></div>`;
  const cls=document.createElement('button');cls.textContent='×';cls.style.cssText='background:transparent;border:none;color:#8899aa;font-size:18px;cursor:pointer;line-height:1;padding:0';cls.onclick=()=>ov.style.display='none';hdr.appendChild(cls);box.appendChild(hdr);
  const bw=document.createElement('div');bw.style.cssText='display:flex';
  const mkBtn=(label,sub,icon,role,bg)=>{
    const btn=document.createElement('button');btn.style.cssText=`flex:1;padding:18px 12px;border:none;background:${bg};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.12s`;
    btn.innerHTML=`<span style="font-size:22px">${icon}</span><span style="font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff">${label}</span><span style="font-size:10px;color:rgba(255,255,255,.6)">${sub}</span>`;
    btn.onmouseenter=()=>btn.style.filter='brightness(1.15)';btn.onmouseleave=()=>btn.style.filter='';
    btn.onclick=()=>{ov.style.display='none';doPlace(p,role,side);};return btn;
  };
  bw.appendChild(mkBtn('Starter','Full circle · number','◉','starter','rgba(39,174,96,.25)'));
  const sep=document.createElement('div');sep.style.cssText='width:1px;background:rgba(255,255,255,.1)';bw.appendChild(sep);
  bw.appendChild(mkBtn('Sub','Small · italic name','○','sub','rgba(52,152,219,.2)'));
  box.appendChild(bw);ov.appendChild(box);
  ov.onclick=e=>{if(e.target===ov)ov.style.display='none';};
}
function doPlace(p,role,side){
  const r=role==='sub'?Math.min(W,H)*0.022:R();
  // Home = left half, Away = right half
  const xBase=side==='home'?0.25:0.75;
  const xZ={GK:side==='home'?0.06:0.94,DEF:side==='home'?0.22:0.78,MID:side==='home'?0.40:0.60,FWD:side==='home'?0.58:0.42};
  const baseX=W*(xZ[p.pos]||xBase);
  const same=tokens.filter(t=>t.player.pos===p.pos&&t.side===side).length;
  const yStep=(H-r*4)/6;const startY=r*2+(same%6)*yStep;
  const rawX = Math.max(r,Math.min(W-r,baseX+(Math.random()-.5)*r*2));
  const rawY = Math.max(r,Math.min(H-r,startY+(Math.random()-.5)*r));
  tokens.push({player:p,role,side,fx:rawX/W,fy:rawY/H});
  draw();renderPanels();
}

function openTeamPicker(side){
  const ov=document.getElementById('tpicker');ov.innerHTML='';ov.style.display='flex';
  const box=document.createElement('div');box.className='tpicker-box';
  const hdr=document.createElement('div');hdr.className='tpicker-hdr';
  hdr.innerHTML=`<span class="tpicker-title">Select ${side==='home'?'Home':'Away'} Team</span>`;
  const cls=document.createElement('button');cls.style.cssText='background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;font-family:inherit';cls.textContent='×';
  cls.onclick=()=>ov.style.display='none';hdr.appendChild(cls);box.appendChild(hdr);
  const sr=document.createElement('div');sr.className='tpicker-srch';
  const inp=document.createElement('input');inp.type='text';inp.placeholder='Search team…';inp.autofocus=true;sr.appendChild(inp);box.appendChild(sr);
  const body=document.createElement('div');body.className='tpicker-body';box.appendChild(body);
  function buildGrid(q){
    body.innerHTML='';
    const groups={};
    Object.entries(TEAMS).forEach(([name,team])=>{
      if(q&&!name.toLowerCase().includes(q.toLowerCase())&&!team.conf.toLowerCase().includes(q.toLowerCase()))return;
      const g=team.group;if(!groups[g])groups[g]=[];groups[g].push({name,team});
    });
    Object.keys(groups).sort().forEach(g=>{
      const conf=groups[g][0].team.conf;
      const lbl=document.createElement('div');lbl.className='conf-label';lbl.textContent=`Group ${g} · ${conf}`;body.appendChild(lbl);
      const grid=document.createElement('div');grid.className='conf-grid';
      groups[g].forEach(({name,team})=>{
        const card=document.createElement('div');card.className='team-card';
        card.innerHTML=`<span class="tc-flag">${team.flag}</span><div><div class="tc-name">${name}</div><div class="tc-grp">Group ${team.group}</div></div>`;
        card.onclick=()=>{
          if(side==='home'){homeTeam=name;}else{awayTeam=name;}
          updateTeamButtons();
          // Remove tokens from this side
          tokens=tokens.filter(t=>t.side!==side);
          ov.style.display='none';renderPanels();draw();
        };
        grid.appendChild(card);
      });
      body.appendChild(grid);
    });
  }
  buildGrid('');inp.oninput=()=>buildGrid(inp.value);
  ov.appendChild(box);ov.onclick=e=>{if(e.target===ov)ov.style.display='none';};
  setTimeout(()=>inp.focus(),50);
}

function updateTeamButtons(){
  const ht=TEAMS[homeTeam];const at=awayTeam?TEAMS[awayTeam]:null;
  document.getElementById('home-flag').textContent=ht?ht.flag:'🏠';
  document.getElementById('home-name').textContent=homeTeam||'Select';
  document.getElementById('away-flag').textContent=at?at.flag:'🌍';
  document.getElementById('away-name').textContent=awayTeam||'Select Team';
}

// ── SAVE / LOAD ──
const STORAGE_KEY = 'wc2026_saves';

function getSaves(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
  catch(e){ return []; }
}
function setSaves(saves){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saves));
}

function serializeState(){
  return {
    homeTeam, awayTeam,
    tokens: tokens.map(t=>({
      playerNo: t.player.no,
      playerSide: t.side,
      x: Math.round(t.fx*1000)/1000,
      y: Math.round(t.fy*1000)/1000,
      role: t.role,
      side: t.side,
      rating: t.player.rating ?? null,
      comment: t.player.comment ?? null
    })),
    drawings
  };
}

function deserializeState(state){
  homeTeam = state.homeTeam || 'USA';
  awayTeam = state.awayTeam || null;
  drawings = state.drawings || [];
  tokens = [];
  (state.tokens||[]).forEach(t=>{
    const teamKey = t.side==='home' ? homeTeam : awayTeam;
    if(!teamKey||!TEAMS[teamKey]) return;
    const player = TEAMS[teamKey].players.find(p=>p.no===Number(t.playerNo));
    if(!player) return;
    if(t.rating!=null) player.rating=t.rating; else delete player.rating;
    if(t.comment!=null) player.comment=t.comment; else delete player.comment;
    // Migrate old pixel coords to fractions if needed (legacy saves had raw px values)
    let fx = t.x, fy = t.y;
    if(fx > 1 || fy > 1){
      // Old format: pixel values — normalize against typical canvas size (fallback)
      fx = Math.min(0.99, Math.max(0.01, fx / (W||1400)));
      fy = Math.min(0.99, Math.max(0.01, fy / (H||700)));
    }
    tokens.push({ player, fx, fy, role:t.role, side:t.side });
  });
  // Restore play builder state (ball + steps)
  ball = state.ball ? {...state.ball} : null;
  playSteps = state.playSteps || [];
  currentStep = playSteps.length - 1;
  // Reset play state safely (don't call stopPlay which touches DOM)
  tweenArrows = null;
  isPlaying = false;
  clearTimeout(playTimer);
  if(playTween){ cancelAnimationFrame(playTween); playTween=null; }
  tweenStart = null;
  const pb=document.getElementById('pbtn-play');
  if(pb){pb.classList.remove('playing');pb.textContent='▶ Play';}
  updateTeamButtons();
  renderPanels();
  // Ensure canvas is sized before drawing
  function drawWhenReady(){
    if(W===0||H===0){ requestAnimationFrame(drawWhenReady); return; }
    draw();
  }
  drawWhenReady();
  if(playMode) updatePlayUI();
}

function openSaveModal(){
  const ov = document.getElementById('smo');
  ov.innerHTML=''; ov.style.display='flex';

  const box = document.createElement('div'); box.className='smo-box';

  // Header
  const hdr = document.createElement('div'); hdr.className='smo-hdr';
  hdr.innerHTML='<span class="smo-title">💾 Save / Load Matchup</span>';
  const cls = document.createElement('button');
  cls.textContent='×'; cls.style.cssText='background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;font-family:inherit;line-height:1';
  cls.onclick=()=>ov.style.display='none';
  hdr.appendChild(cls); box.appendChild(hdr);

  const body = document.createElement('div'); body.className='smo-body';

  // Save new section
  const saveLabel = document.createElement('div');
  saveLabel.style.cssText='font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px';
  saveLabel.textContent='Save Current State';
  body.appendChild(saveLabel);

  const nameRow = document.createElement('div'); nameRow.className='save-name-row';
  const inp = document.createElement('input'); inp.className='save-name-input'; inp.type='text';
  // Auto-suggest name from current matchup
  const homeName = homeTeam||'Home';
  const awayName = awayTeam||'Away';
  const dateStr = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  inp.value = `${homeName} vs ${awayName} — ${dateStr}`;
  inp.placeholder='Name this matchup…';
  inp.select();
  nameRow.appendChild(inp);

  const saveBtn = document.createElement('button'); saveBtn.className='save-now-btn'; saveBtn.textContent='Save';
  saveBtn.onclick=()=>{
    const name = inp.value.trim() || `Matchup ${Date.now()}`;
    const saves = getSaves();
    saves.unshift({ id: Date.now(), name, date: new Date().toISOString(), state: serializeState() });
    setSaves(saves);
    buildSavesList();
    inp.value='';
    // Flash confirmation
    saveBtn.textContent='✓ Saved!'; saveBtn.style.background='#1e6830';
    setTimeout(()=>{ saveBtn.textContent='Save'; saveBtn.style.background=''; },1500);
  };
  nameRow.appendChild(saveBtn);
  body.appendChild(nameRow);

  // Saves list section
  const listLabel = document.createElement('div');
  listLabel.style.cssText='font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-top:4px;border-top:1px solid var(--border)';
  listLabel.style.marginTop='6px'; listLabel.style.paddingTop='14px';
  listLabel.textContent='Saved Matchups';
  body.appendChild(listLabel);

  const listDiv = document.createElement('div'); listDiv.className='saves-list'; listDiv.id='saves-list-inner';
  body.appendChild(listDiv);

  box.appendChild(body); ov.appendChild(box);
  ov.onclick=e=>{if(e.target===ov)ov.style.display='none';};

  buildSavesList();
  setTimeout(()=>inp.select(),50);
}

function buildSavesList(){
  const listDiv = document.getElementById('saves-list-inner');
  if(!listDiv) return;
  listDiv.innerHTML='';
  const saves = getSaves();

  if(!saves.length){
    listDiv.innerHTML='<div class="no-saves">No saved matchups yet.<br>Set up a lineup above and hit Save!</div>';
    return;
  }

  saves.forEach((save,idx)=>{
    const item = document.createElement('div'); item.className='save-item';

    const info = document.createElement('div'); info.className='save-item-info';
    const nm = document.createElement('div'); nm.className='save-item-name'; nm.textContent=save.name;
    const meta = document.createElement('div'); meta.className='save-item-meta';
    const d = new Date(save.date);
    const st = save.state;
    const pCount = (st.tokens||[]).length;
    const rCount = (st.tokens||[]).filter(t=>t.rating!=null).length;
    const dCount = (st.drawings||[]).length;
    const home = st.homeTeam||'?'; const away = st.awayTeam||'?';
    const homeFlag = TEAMS[home]?TEAMS[home].flag:'🏠';
    const awayFlag = TEAMS[away]?TEAMS[away].flag:'🌍';
    meta.textContent = `${homeFlag} ${home} vs ${awayFlag} ${away}  ·  ${pCount} players${rCount>0?' · '+rCount+' rated':''}  ·  ${dCount} drawings  ·  ${d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
    info.appendChild(nm); info.appendChild(meta);

    const btns = document.createElement('div'); btns.className='save-item-btns';

    const loadBtn = document.createElement('button'); loadBtn.className='si-load'; loadBtn.textContent='Load';
    loadBtn.onclick=()=>{
      if(confirm(`Load "${save.name}"? Current state will be replaced.`)){
        deserializeState(save.state);
        document.getElementById('smo').style.display='none';
      }
    };

    const delBtn = document.createElement('button'); delBtn.className='si-del'; delBtn.textContent='✕';
    delBtn.title='Delete save';
    delBtn.onclick=()=>{
      if(confirm(`Delete "${save.name}"?`)){
        const saves2=getSaves(); saves2.splice(idx,1); setSaves(saves2); buildSavesList();
      }
    };

    btns.appendChild(loadBtn); btns.appendChild(delBtn);
    item.appendChild(info); item.appendChild(btns);
    listDiv.appendChild(item);
  });
}

document.getElementById('btn-save').onclick=()=>{
  // Quick-save with auto name, or open modal
  openSaveModal();
};
document.getElementById('btn-load').onclick=()=>openSaveModal();

// Based on Animated_GIF / jsgif encoder
const GIFEncoder = (function(){

    function cl_block(outs){cl_hash(HSIZE);free_ent=BITS+2;clear_flg=true;output(BITS,outs);}
    function cl_hash(s){for(var i=0;i<s;i++)htab[i]=-1;}
    function compress(init_bits,outs){var fcode,c,i,ent,disp,hsize_reg,hshift;init_bits=init_bits;n_bits=init_bits;maxcode_=MAXCODE(n_bits);BITS=1<<init_bits-1;var clear_code=BITS,eof_code=clear_code+1;free_ent=clear_code+2;a_count=0;ent=pixels[0]&0xFF;hshift=0;for(fcode=HSIZE;fcode<65536;fcode*=2)hshift++;hshift=8-hshift;hsize_reg=HSIZE;cl_hash(hsize_reg);output(clear_code,outs);var pixIdx=1,nPix=pixels.length;outer:while(pixIdx<nPix){c=pixels[pixIdx++]&0xFF;fcode=(c<<MAXBITS)+ent;i=(c<<hshift)^ent;if(htab[i]==fcode){ent=codetab[i];continue;}else if(htab[i]>=0){disp=hsize_reg-i;if(i===0)disp=1;do{if((i-=disp)<0)i+=hsize_reg;if(htab[i]==fcode){ent=codetab[i];continue outer;}}while(htab[i]>=0);}output(ent,outs);ent=c;if(free_ent<MAXMAXCODE){codetab[i]=free_ent++;htab[i]=fcode;}else cl_block(outs);}output(ent,outs);output(eof_code,outs);}
    function flush_char(outs){if(a_count>0){outs.writeByte(a_count);for(var i=0;i<a_count;i++)outs.writeByte(accum[i]);a_count=0;}}
    function output(code,outs){cur_accum&=(1<<cur_bits)-1;if(cur_bits>0)cur_accum|=code<<cur_bits;else cur_accum=code;cur_bits+=n_bits;while(cur_bits>=8){char_out(cur_accum&0xFF,outs);cur_accum>>=8;cur_bits-=8;}if(free_ent>maxcode_||clear_flg){if(clear_flg){maxcode_=MAXCODE(n_bits=initCodeSize+1);clear_flg=false;}else{n_bits++;if(n_bits==MAXBITS)maxcode_=MAXMAXCODE;else maxcode_=MAXCODE(n_bits);}}if(code==EOF){while(cur_bits>0){char_out(cur_accum&0xFF,outs);cur_accum>>=8;cur_bits-=8;}flush_char(outs);}}
    this.encode=function(os){os.writeByte(initCodeSize);pixIdx=0;compress(initCodeSize+1,os);os.writeByte(0);};
    this.pixIdx=0;
  }

  function Encoder(){
    this.frames=[];this.delay=10;this.repeat=0;this.transparent=null;this.width=0;this.height=0;
  }
  Encoder.prototype.setDelay=function(ms){this.delay=Math.round(ms/10);};
  Encoder.prototype.setRepeat=function(r){this.repeat=r;};
  Encoder.prototype.setTransparent=function(c){this.transparent=c;};
  Encoder.prototype.setSize=function(w,h){this.width=w;this.height=h;};
  Encoder.prototype.addFrame=function(ctx){
    var imgd=ctx.getImageData(0,0,this.width,this.height);
    this.frames.push(imgd);
  };
  Encoder.prototype.render=function(){
    var out=new ByteArray();
    var W=this.width,H=this.height;
    // Header
    out.writeString('GIF89a');
    out.writeShort(W);out.writeShort(H);
    out.writeByte(0xF7); // global color table, 256 colors
    out.writeByte(0);    // background index
    out.writeByte(0);    // pixel aspect
    // Write temporary palette (will overwrite per frame via local CT)
    for(var i=0;i<256;i++){out.writeByte(i);out.writeByte(i);out.writeByte(i);}
    // Netscape loop extension
    if(this.repeat>=0){
      out.writeByte(0x21);out.writeByte(0xFF);out.writeByte(11);
      out.writeString('NETSCAPE2.0');
      out.writeByte(3);out.writeByte(1);
      out.writeShort(this.repeat);out.writeByte(0);
    }
    for(var fi=0;fi<this.frames.length;fi++){
      var imgd=this.frames[fi];
      var pixels=new Uint8Array(imgd.data.buffer);
      // Quantize
      var nq=new NeuQuant(pixels,10);
      var cmap=nq.process();
      // Map pixels to palette
      var indexedPixels=new Uint8Array(W*H);
      var k=0;
      for(var py=0;py<H;py++){
        for(var px=0;px<W;px++){
          var idx=(py*W+px)*4;
          indexedPixels[k++]=nq.map(pixels[idx],pixels[idx+1],pixels[idx+2]);
        }
      }
      // Graphic control extension
      out.writeByte(0x21);out.writeByte(0xF9);out.writeByte(4);
      out.writeByte(0);
      out.writeShort(this.delay);
      out.writeByte(0);out.writeByte(0);
      // Image descriptor with local color table
      out.writeByte(0x2C);
      out.writeShort(0);out.writeShort(0);out.writeShort(W);out.writeShort(H);
      out.writeByte(0x87); // local color table, 256 colors, interlace off
      // Local color table
      for(var ci=0;ci<256;ci++){
        out.writeByte(cmap[ci*3]||0);
        out.writeByte(cmap[ci*3+1]||0);
        out.writeByte(cmap[ci*3+2]||0);
      }
      // LZW
      var lzw=new LZWEncoder(W,H,indexedPixels,8);
      lzw.pixels=indexedPixels;
      lzw.encode(out);
    }
    out.writeByte(0x3B); // trailer
    return new Uint8Array(out.getData());
  };
  return Encoder;
})();

// PLAY BUILDER
// ═══════════════════════════════════════════════

// Ball state: fractional coords, null if not placed
let ball = null; // {fx, fy}
let ballDrag = false;

// Play steps: each step = {tokens: [{playerNo, side, fx, fy, role}], ball: {fx,fy}|null, drawings: [...]}
let playSteps = [];
let currentStep = -1; // which step we're viewing (-1 = live)
let playMode = false;
let isPlaying = false;
let playTimer = null;
let playTween = null; // requestAnimationFrame handle

// Tween state
let tweenFrom = null, tweenTo = null, tweenT = 0, tweenDuration = 900;

function enterPlayMode(){
  playMode = true;
  document.getElementById('play-bar').classList.add('visible');
  document.getElementById('btn-play-mode').classList.add('active');
  document.getElementById('btn-play-mode').textContent = '✕ Exit Builder';
  document.querySelector('.toolbar').style.display = 'none';
  ratingMode = false;
  document.getElementById('btn-rate').classList.remove('active');
  document.getElementById('btn-rate').textContent = '⭐ Rate Players';
  updatePlayUI();
}

function exitPlayMode(){
  stopPlay();
  playMode = false;
  currentStep = -1;
  document.getElementById('play-bar').classList.remove('visible');
  document.getElementById('btn-play-mode').classList.remove('active');
  document.getElementById('btn-play-mode').textContent = '🎬 Play Builder';
  document.querySelector('.toolbar').style.display = '';
  draw();
}

function captureStep(){
  const snap = {
    tokens: tokens.map(t=>({
      playerNo: t.player.no,
      side: t.side,
      role: t.role,
      fx: t.fx,
      fy: t.fy,
    })),
    ball: ball ? {...ball} : null,
    drawings: JSON.parse(JSON.stringify(drawings))
  };

  if(currentStep === -1 || currentStep === playSteps.length - 1){
    // Append new step
    playSteps.push(snap);
    currentStep = playSteps.length - 1;
  } else {
    // Insert/overwrite after current
    playSteps.splice(currentStep + 1, playSteps.length - currentStep - 1, snap);
    currentStep = playSteps.length - 1;
  }
  updatePlayUI();
  draw();

  // Flash record button
  const rb = document.getElementById('pbtn-record');
  rb.classList.add('recording');
  setTimeout(()=>rb.classList.remove('recording'), 600);
}

function restoreStep(stepIdx, instant=false){
  if(stepIdx < 0 || stepIdx >= playSteps.length) return;
  const s = playSteps[stepIdx];
  currentStep = stepIdx;

  // Restore drawings for this step
  drawings = JSON.parse(JSON.stringify(s.drawings));

  if(instant){
    // Snap positions
    s.tokens.forEach(st=>{
      const tok = tokens.find(t=>t.player.no===st.playerNo && t.side===st.side);
      if(tok){ tok.fx=st.fx; tok.fy=st.fy; }
    });
    ball = s.ball ? {...s.ball} : null;
    updatePlayUI();
    draw();
  } else {
    // Tween from current to target
    tweenFrom = {
      tokens: tokens.map(t=>({no:t.player.no, side:t.side, fx:t.fx, fy:t.fy})),
      ball: ball ? {...ball} : null
    };
    tweenTo = {
      tokens: s.tokens.map(st=>({no:st.playerNo, side:st.side, fx:st.fx, fy:st.fy})),
      ball: s.ball ? {...s.ball} : null,
      drawings: s.drawings
    };
    tweenT = 0;
    tweenDuration = parseInt(document.getElementById('play-speed').value);
    if(playTween) cancelAnimationFrame(playTween);
    animateTween();
  }
}

let tweenStart = null;
let tweenArrows = null; // {players:[{x1,y1,x2,y2,col}], ball:{x1,y1,x2,y2}|null, progress:0}
function animateTween(ts){
  if(!tweenStart) tweenStart = ts;
  const elapsed = ts - tweenStart;
  const t = Math.min(elapsed / tweenDuration, 1);
  // ease-in-out cubic
  const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;

  // Interpolate token positions
  tweenFrom.tokens.forEach(from=>{
    const to = tweenTo.tokens.find(x=>x.no===from.no && x.side===from.side);
    const tok = tokens.find(x=>x.player.no===from.no && x.side===from.side);
    if(tok && to){
      tok.fx = from.fx + (to.fx - from.fx)*e;
      tok.fy = from.fy + (to.fy - from.fy)*e;
    }
  });

  // Interpolate ball
  if(tweenFrom.ball && tweenTo.ball){
    ball = {
      fx: tweenFrom.ball.fx + (tweenTo.ball.fx - tweenFrom.ball.fx)*e,
      fy: tweenFrom.ball.fy + (tweenTo.ball.fy - tweenFrom.ball.fy)*e,
    };
  } else {
    ball = tweenTo.ball ? {...tweenTo.ball} : null;
  }

  // Fade drawings in during second half of tween
  if(t > 0.5){
    drawings = JSON.parse(JSON.stringify(tweenTo.drawings));
  }

  draw();

  if(t < 1){
    tweenStart = tweenStart;
    playTween = requestAnimationFrame(ts2=>{tweenStart=tweenStart||ts2;animateTween(ts2);});
  } else {
    tweenStart = null;
    updatePlayUI();
    if(isPlaying) scheduleNextStep();
  }
}

// Override animateTween to properly use timestamp
function animateTween2(){
  tweenStart = null;

  // Build movement arrows from tweenFrom → tweenTo
  tweenArrows = {
    progress: 0,
    players: tweenFrom.tokens.map(from=>{
      const to = tweenTo.tokens.find(x=>x.no===from.no&&x.side===from.side);
      if(!to) return null;
      // Get team color for this token
      const teamKey = from.side==='home'?homeTeam:awayTeam;
      const col = (teamKey&&TEAMS[teamKey]) ? TEAMS[teamKey].color : '#ffffff';
      return {x1:from.fx, y1:from.fy, x2:to.fx, y2:to.fy, col};
    }).filter(Boolean),
    ball: (()=>{
      if(!tweenFrom.ball || !tweenTo.ball) return null;
      // Check if any player moved with the ball (dribble) — if so, no pass arrow
      const bx1=tweenFrom.ball.fx, by1=tweenFrom.ball.fy;
      const bx2=tweenTo.ball.fx,   by2=tweenTo.ball.fy;
      const threshold = 0.04; // fraction of canvas — if player tracks ball this closely it's a dribble
      const isDribble = tweenFrom.tokens.some(from=>{
        const to = tweenTo.tokens.find(x=>x.no===from.no&&x.side===from.side);
        if(!to) return false;
        // Player start near ball start AND player end near ball end
        const startClose = Math.hypot(from.fx-bx1, from.fy-by1) < threshold;
        const endClose   = Math.hypot(to.fx-bx2,   to.fy-by2)   < threshold;
        return startClose && endClose;
      });
      if(isDribble) return null;
      return {x1:bx1, y1:by1, x2:bx2, y2:by2};
    })()
  };

  function step(ts){
    if(!tweenStart) tweenStart = ts;
    const elapsed = ts - tweenStart;
    const t = Math.min(elapsed/tweenDuration, 1);
    const e = t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
    // Update arrow opacity with tween progress
    if(tweenArrows) tweenArrows.progress = t;
    tweenFrom.tokens.forEach(from=>{
      const to=tweenTo.tokens.find(x=>x.no===from.no&&x.side===from.side);
      const tok=tokens.find(x=>x.player.no===from.no&&x.side===from.side);
      if(tok&&to){tok.fx=from.fx+(to.fx-from.fx)*e;tok.fy=from.fy+(to.fy-from.fy)*e;}
    });
    if(tweenFrom.ball&&tweenTo.ball){
      ball={fx:tweenFrom.ball.fx+(tweenTo.ball.fx-tweenFrom.ball.fx)*e,fy:tweenFrom.ball.fy+(tweenTo.ball.fy-tweenFrom.ball.fy)*e};
    } else { ball=tweenTo.ball?{...tweenTo.ball}:null; }
    if(t>0.5) drawings=JSON.parse(JSON.stringify(tweenTo.drawings));
    draw();
    if(t<1){ playTween=requestAnimationFrame(step); }
    else { tweenStart=null; tweenArrows=null; updatePlayUI(); if(isPlaying) scheduleNextStep(); }
  }
  playTween=requestAnimationFrame(step);
}

function scheduleNextStep(){
  clearTimeout(playTimer);
  const pauseMs = parseInt(document.getElementById('play-speed').value) * 0.4;
  playTimer = setTimeout(()=>{
    let next = currentStep + 1;
    if(next >= playSteps.length){
      // Loop: snap instantly back to step 0 positions, then tween to step 1
      restoreStep(0, true); // instant snap, no tween
      currentStep = 0;
      updatePlayUI();
      if(playSteps.length > 1){
        // Brief pause then tween to step 1
        playTimer = setTimeout(()=>{ doTweenTo(1); }, pauseMs);
      }
      return;
    }
    currentStep = next;
    if(playSteps.length > 0) doTweenTo(currentStep);
  }, pauseMs);
}

function doTweenTo(stepIdx){
  if(stepIdx < 0 || stepIdx >= playSteps.length) return;
  const s = playSteps[stepIdx];
  currentStep = stepIdx;
  tweenFrom = {
    tokens: tokens.map(t=>({no:t.player.no,side:t.side,fx:t.fx,fy:t.fy})),
    ball: ball?{...ball}:null
  };
  tweenTo = {
    tokens: s.tokens.map(st=>({no:st.playerNo,side:st.side,fx:st.fx,fy:st.fy})),
    ball: s.ball?{...s.ball}:null,
    drawings: s.drawings
  };
  tweenDuration = parseInt(document.getElementById('play-speed').value);
  animateTween2();
  updatePlayUI();
}

function startPlay(){
  if(playSteps.length < 2){alert('Record at least 2 steps to play!');return;}
  isPlaying = true;
  document.getElementById('pbtn-play').classList.add('playing');
  document.getElementById('pbtn-play').textContent = '⏹ Stop';
  currentStep = 0;
  doTweenTo(0);
}

function stopPlay(){
  isPlaying = false;
  clearTimeout(playTimer);
  if(playTween){ cancelAnimationFrame(playTween); playTween=null; }
  tweenStart=null; tweenArrows=null;
  document.getElementById('pbtn-play').classList.remove('playing');
  document.getElementById('pbtn-play').textContent = '▶ Play';
}

function updatePlayUI(){
  const n = playSteps.length;
  document.getElementById('step-counter').textContent = n===0 ? '0 steps' : `Step ${Math.max(0,currentStep)+1}/${n}`;
  document.getElementById('pbtn-prev').disabled = currentStep <= 0;
  document.getElementById('pbtn-next').disabled = currentStep >= n-1;

  // Dots
  const dots = document.getElementById('step-dots');
  dots.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='step-dot filled'+(i===currentStep?' active':'');
    d.title=`Step ${i+1}`;
    d.onclick=(()=>{const idx=i;return()=>{if(!isPlaying){doTweenTo(idx);};};})();
    dots.appendChild(d);
  }
}

// Ball drawing
function drawBall(c, fx, fy, isDragging){
  const cx2=fx*W, cy2=fy*H;
  const r=Math.min(W,H)*0.022;
  // Shadow
  c.save();c.shadowColor='rgba(0,0,0,.6)';c.shadowBlur=isDragging?14:7;
  c.beginPath();c.arc(cx2,cy2,r,0,Math.PI*2);c.fillStyle='#f5f5f5';c.fill();c.restore();
  // Ball base
  c.beginPath();c.arc(cx2,cy2,r,0,Math.PI*2);c.fillStyle='#f0f0f0';c.fill();
  // Pentagon pattern
  c.strokeStyle='#222';c.lineWidth=1;
  // Draw simplified soccer ball lines
  const segs=[
    [0,-1],[0.951,-0.309],[0.588,0.809],[-0.588,0.809],[-0.951,-0.309]
  ];
  c.beginPath();
  segs.forEach(([sx,sy],i)=>{
    const bx=cx2+sx*r*0.55, by=cy2+sy*r*0.55;
    const nx=cx2+sx*r, ny=cy2+sy*r;
    if(i===0)c.moveTo(bx,by);else c.lineTo(bx,by);
    c.moveTo(cx2,cy2);c.lineTo(nx,ny);
    c.moveTo(bx,by);
  });
  c.stroke();
  // Center pentagon
  c.beginPath();
  segs.forEach(([sx,sy],i)=>{
    const bx=cx2+sx*r*0.55, by=cy2+sy*r*0.55;
    if(i===0)c.moveTo(bx,by);else c.lineTo(bx,by);
  });
  c.closePath();c.fillStyle='#333';c.fill();
  // Ring
  c.beginPath();c.arc(cx2,cy2,r,0,Math.PI*2);
  c.strokeStyle=isDragging?'#f0c040':'rgba(0,0,0,.4)';c.lineWidth=isDragging?2.5:1.5;c.stroke();
}

// Draw movement arrows during tween
function drawTweenArrows(c, alpha){
  if(!tweenArrows) return;
  c.save();
  c.globalAlpha = alpha;
  c.lineCap = 'round'; c.lineJoin = 'round';

  const minDist = 8; // don't draw arrow for tiny movements

  // Player movement arrows — solid lines per team color
  tweenArrows.players.forEach(a=>{
    const dx=(a.x2-a.x1)*W, dy=(a.y2-a.y1)*H;
    if(Math.hypot(dx,dy) < minDist) return;
    const x1=a.x1*W, y1=a.y1*H, x2=a.x2*W, y2=a.y2*H;
    c.strokeStyle = a.col;
    c.fillStyle   = a.col;
    c.lineWidth   = 2;
    c.setLineDash([]);
    c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke();
    // Arrowhead
    const angle=Math.atan2(y2-y1,x2-x1), len=10, sp=0.42;
    c.beginPath();
    c.moveTo(x2,y2);
    c.lineTo(x2-len*Math.cos(angle-sp), y2-len*Math.sin(angle-sp));
    c.lineTo(x2-len*Math.cos(angle+sp), y2-len*Math.sin(angle+sp));
    c.closePath(); c.fill();
  });

  // Ball movement arrow — dashed white line
  if(tweenArrows.ball){
    const a=tweenArrows.ball;
    const dx=(a.x2-a.x1)*W, dy=(a.y2-a.y1)*H;
    if(Math.hypot(dx,dy) >= minDist){
      const x1=a.x1*W, y1=a.y1*H, x2=a.x2*W, y2=a.y2*H;
      c.strokeStyle='#fff'; c.fillStyle='#fff';
      c.lineWidth=2.5;
      c.setLineDash([7,5]);
      c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke();
      c.setLineDash([]);
      // Arrowhead (solid even on dashed line)
      const angle=Math.atan2(y2-y1,x2-x1), len=11, sp=0.42;
      c.beginPath();
      c.moveTo(x2,y2);
      c.lineTo(x2-len*Math.cos(angle-sp), y2-len*Math.sin(angle-sp));
      c.lineTo(x2-len*Math.cos(angle+sp), y2-len*Math.sin(angle+sp));
      c.closePath(); c.fill();
    }
  }

  c.globalAlpha=1; c.setLineDash([]); c.restore();
}

// Patch draw() to also draw ball and handle play mode
const _origDraw = draw;
draw = function(preview){
  if(!W||!H)return;
  drawPitch(ctx);
  drawings.forEach(s=>renderShape(ctx,s));
  if(preview)renderShape(ctx,preview);
  tokens.forEach((t,i)=>{
    const px=t.fx*W, py=t.fy*H;
    t.role==='sub'
      ? drawSubToken(ctx,t.player,px,py,i===dragIdx,t.side)
      : drawStarterToken(ctx,t.player,px,py,i===dragIdx,t.side);
  });
  if(ball) drawBall(ctx, ball.fx, ball.fy, ballDrag);
  // Draw movement arrows during tween — fade in with progress
  if(tweenArrows && tweenArrows.progress > 0){
    drawTweenArrows(ctx, Math.min(1, tweenArrows.progress * 2.5));
  }
};

// Patch canvas events to handle ball and play mode tool
const _ballR = ()=>Math.min(W,H)*0.022;

// Override mousedown to handle ball + play-mode ball placement
const origMousedown = cv.onmousedown;

cv.addEventListener('mousedown', e=>{
  if(e._handled) return;
  // Ball tool: click to place ball
  if(tool==='ball'){
    const{x,y}=ptXY(e);
    ball={fx:x/W, fy:y/H};
    ballDrag=true;
    draw();
    return;
  }
  // Check ball drag (select mode)
  if(tool==='select'&&ball&&!ratingMode){
    const{x,y}=ptXY(e);
    const bx=ball.fx*W, by=ball.fy*H;
    if(Math.hypot(x-bx,y-by)<_ballR()+4){
      ballDrag=true;
      draw();
      return;
    }
  }
}, true); // capture phase so it runs before other handlers

cv.addEventListener('mousemove', e=>{
  if(ballDrag){
    const{x,y}=ptXY(e);
    ball={fx:Math.max(0.01,Math.min(0.99,x/W)),fy:Math.max(0.01,Math.min(0.99,y/H))};
    draw();
  }
});

cv.addEventListener('mouseup', e=>{
  if(ballDrag){ballDrag=false;draw();}
});

cv.addEventListener('touchstart',e=>{
  if(tool==='ball'){
    const t2=e.touches[0],{x,y}=ptXY({clientX:t2.clientX,clientY:t2.clientY});
    ball={fx:x/W,fy:y/H};ballDrag=true;draw();return;
  }
  if(tool==='select'&&ball&&!ratingMode){
    const t2=e.touches[0],{x,y}=ptXY({clientX:t2.clientX,clientY:t2.clientY});
    if(Math.hypot(x-ball.fx*W,y-ball.fy*H)<_ballR()+8){ballDrag=true;draw();return;}
  }
},{capture:true,passive:false});

cv.addEventListener('touchmove',e=>{
  if(ballDrag){e.preventDefault();const t2=e.touches[0],{x,y}=ptXY({clientX:t2.clientX,clientY:t2.clientY});ball={fx:Math.max(0.01,Math.min(0.99,x/W)),fy:Math.max(0.01,Math.min(0.99,y/H))};draw();}
},{passive:false});

cv.addEventListener('touchend',e=>{if(ballDrag){ballDrag=false;draw();}});

// Right-click ball to remove
cv.addEventListener('contextmenu',e=>{
  if(ball){const{x,y}=ptXY(e);if(Math.hypot(x-ball.fx*W,y-ball.fy*H)<_ballR()+4){e.stopImmediatePropagation();e.preventDefault();ball=null;draw();return;}}
},{capture:true});

// GIF Export using gif.js
wireBtn('pbtn-gif', async()=>{
  if(playSteps.length<2){alert('Record at least 2 steps first!');return;}
  const btn=document.getElementById('pbtn-gif');
  btn.textContent='⏳ Building...';btn.disabled=true;

  const fps=12;
  const spd=parseInt(document.getElementById('play-speed').value);
  const frameDur=Math.round(1000/fps);
  const framesPerStep=Math.max(4,Math.round(spd/1000*fps));
  const pauseFrames=Math.max(3,Math.round(framesPerStep*0.4));

  // Save current state to restore after
  const savedTokens=tokens.map(t=>({no:t.player.no,side:t.side,fx:t.fx,fy:t.fy}));
  const savedBall=ball?{...ball}:null;
  const savedDrawings=JSON.parse(JSON.stringify(drawings));

  const enc=new GIFEncoder();
  enc.setSize(W,H);
  enc.setRepeat(0);
  enc.setDelay(frameDur);

  // Render each transition
  for(let si=0;si<playSteps.length;si++){
    const from=si===0?playSteps[playSteps.length-1]:playSteps[si-1];
    const to=playSteps[si];
    for(let f=0;f<=framesPerStep;f++){
      const t=f/framesPerStep;
      const e=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
      to.tokens.forEach(st=>{
        const fromT=from.tokens.find(x=>x.playerNo===st.playerNo&&x.side===st.side)||st;
        const tok=tokens.find(x=>x.player.no===st.playerNo&&x.side===st.side);
        if(tok){tok.fx=fromT.fx+(st.fx-fromT.fx)*e;tok.fy=fromT.fy+(st.fy-fromT.fy)*e;}
      });
      if(from.ball&&to.ball){ball={fx:from.ball.fx+(to.ball.fx-from.ball.fx)*e,fy:from.ball.fy+(to.ball.fy-from.ball.fy)*e};}
      else{ball=to.ball?{...to.ball}:null;}
      // Build movement arrows for this frame
      tweenArrows={
        progress:t,
        players:from.tokens.map(fr=>{
          const toT=to.tokens.find(x=>x.playerNo===fr.playerNo&&x.side===fr.side);if(!toT)return null;
          const teamKey=fr.side==='home'?homeTeam:awayTeam;
          const col=(teamKey&&TEAMS[teamKey])?TEAMS[teamKey].color:'#fff';
          return{x1:fr.fx,y1:fr.fy,x2:toT.fx,y2:toT.fy,col};
        }).filter(Boolean),
        ball:(()=>{
          if(!from.ball||!to.ball)return null;
          const bx1=from.ball.fx,by1=from.ball.fy,bx2=to.ball.fx,by2=to.ball.fy;
          const threshold=0.04;
          const isDribble=from.tokens.some(fr=>{
            const toT=to.tokens.find(x=>x.playerNo===fr.playerNo&&x.side===fr.side);if(!toT)return false;
            return Math.hypot(fr.fx-bx1,fr.fy-by1)<threshold&&Math.hypot(toT.fx-bx2,toT.fy-by2)<threshold;
          });
          return isDribble?null:{x1:bx1,y1:by1,x2:bx2,y2:by2};
        })()
      };
      drawings=t>0.5?JSON.parse(JSON.stringify(to.drawings)):JSON.parse(JSON.stringify(from.drawings));
      draw();
      enc.addFrame(ctx);
    }
    // Pause frames on this step
    tweenArrows=null;
    to.tokens.forEach(st=>{const tok=tokens.find(x=>x.player.no===st.playerNo&&x.side===st.side);if(tok){tok.fx=st.fx;tok.fy=st.fy;}});
    ball=to.ball?{...to.ball}:null;
    drawings=JSON.parse(JSON.stringify(to.drawings));
    draw();
    enc.setDelay(frameDur*3);
    for(let p=0;p<pauseFrames;p++)enc.addFrame(ctx);
    enc.setDelay(frameDur);
  }

  // Encode and download
  const bytes=enc.render();
  const blob=new Blob([bytes],{type:'image/gif'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='WC2026_Play.gif';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);

  // Restore state
  tweenArrows=null;
  tokens.forEach(t=>{const s=savedTokens.find(x=>x.no===t.player.no&&x.side===t.side);if(s){t.fx=s.fx;t.fy=s.fy;}});
  ball=savedBall;drawings=savedDrawings;
  btn.textContent='🎬 GIF';btn.disabled=false;
  draw();
});

// Detect formation from starter tokens
function detectFormation(side){
  const starters=tokens.filter(t=>t.side===side&&t.role==='starter');
  if(starters.length<7)return null;
  // Count by position, exclude GK
  const outfield=starters.filter(t=>t.player.pos!=='GK');
  const defs=outfield.filter(t=>t.player.pos==='DEF').length;
  const mids=outfield.filter(t=>t.player.pos==='MID').length;
  const fwds=outfield.filter(t=>t.player.pos==='FWD').length;
  if(defs+mids+fwds===0)return null;
  return defs+'-'+mids+'-'+fwds;
}
